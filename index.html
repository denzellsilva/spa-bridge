<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="form-container">
      <button id="get">Get Data from PhilHealth Tab</button>

      <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 15px" />

      <div class="form-group">
        <label for="my-pin">PhilHealth Number</label>
        <input type="text" id="my-pin" placeholder="Waiting for data..." />
      </div>

      <div class="form-group">
        <label for="my-lastName">Last Name</label>
        <input type="text" id="my-lastName" placeholder="Waiting for data..." />
      </div>

      <div class="form-group">
        <label for="my-firstName">First Name</label>
        <input
          type="text"
          id="my-firstName"
          placeholder="Waiting for data..."
        />
      </div>

      <div class="form-group">
        <label for="my-spa">SPA Number</label>
        <input type="text" id="my-spa" placeholder="Waiting for data..." />
      </div>

      <div class="form-group">
        <label for="my-amount">Amount</label>
        <input type="text" id="my-amount" placeholder="Waiting for data..." />
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
